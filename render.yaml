# Render.com Blueprint（クラウド常設デプロイ設定）
# Render の「New +」→「Blueprint」でこのリポジトリを選ぶと、この設定で web サービスが作られる。
# 秘密情報(sync:false)は Render のダッシュボードで入力する（GitHubには載せない）。
services:
  - type: web
    name: tradingview-rsi-relay
    runtime: python
    plan: starter # 常時起動($7/月)。free だと15分無操作でスリープし監視が止まるため本番は starter 固定
    region: singapore # 日本から近いリージョン
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      # 以下の運用系はダッシュボードで管理する(sync:false)。コードpushで値が戻らないようにするため。
      - key: TRADING_MODE
        sync: false # DRY_RUN → 準備完了後にダッシュボードで LIVE へ
      - key: ALLOWED_SYMBOLS
        sync: false # 本番はダッシュボードで XRP/JPY に絞る
      - key: ORDER_QUOTE_AMOUNT
        sync: false # 固定額（ORDER_SIZE_PCT=0 の時のフォールバック）
      - key: ORDER_SIZE_PCT
        value: "0.10" # 発注額=総資産の10%（資金が足りなければある分だけ）。0で固定額
      - key: MIN_ORDER_JPY
        value: "100" # これ未満の発注額は資金不足で見送り
      - key: EXCHANGE_ID
        sync: false # 本番は bitbank
      - key: WEBHOOK_SECRET
        sync: false # ダッシュボードで入力（秘密）
      - key: DISCORD_WEBHOOK_URL
        sync: false # ダッシュボードで入力（秘密）
      - key: SYMBOL_MAP
        value: XRPUSDT=XRP/JPY,ETHUSDT=ETH/JPY,SOLUSDT=SOL/JPY,DOGEUSDT=DOGE/JPY,LTCUSDT=LTC/JPY,DOTUSDT=DOT/JPY,LINKUSDT=LINK/JPY,AVAXUSDT=AVAX/JPY,ATOMUSDT=ATOM/JPY,XLMUSDT=XLM/JPY
      - key: MARGIN_SYMBOLS
        sync: false # 信用(ロング+ショート)対象。空=無効。例 XRP/JPY,ETH/JPY。準備完了後にダッシュボードで設定
      - key: MAX_OPEN_POSITIONS
        value: "3"
      - key: ORDER_COOLDOWN_SEC
        value: "60"
      - key: STOP_LOSS_PCT
        value: "0.05" # 取得単価から5%下落で自動損切り（ダッシュボードで調整可）
      - key: TAKE_PROFIT_PCT
        value: "0.05" # 取得単価から5%上昇で自動利確（ダッシュボードで調整可）
      - key: MONITOR_INTERVAL_SEC
        value: "60"
      - key: MAX_DAILY_LOSS_JPY
        value: "0" # 固定額の損失上限（0=無効。下のPCTを使う。残高が読めない時のフォールバック用）
      - key: MAX_DAILY_LOSS_PCT
        value: "0.08" # 本日の損失が総資産の8%を超えたら当日は新規買い停止
      - key: TRADING_HOURS
        value: "" # 空=24時間。例 "8-24" で8:00-24:00 JSTのみ新規買い
      - key: MAX_TRADES_PER_DAY
        value: "0" # 1日の新規エントリー上限（0=無効）
      - key: EXCHANGE_API_KEY
        sync: false
      - key: EXCHANGE_API_SECRET
        sync: false
